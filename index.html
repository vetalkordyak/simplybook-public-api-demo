<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SimplyBook.me JSON-RPC Booking Demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="app.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5" style="max-width: 640px;">

    <div class="mb-4">
        <h3 class="fw-semibold mb-1">SimplyBook.me Booking Demo</h3>
        <p class="text-muted small mb-0">
            JSON-RPC v1 API &mdash; <code>user-api.simplybook.me</code>
        </p>
    </div>

    <div id="alert-area"></div>

    <!-- Step 1: Connect -->
    <div class="demo-card active" id="card-connect">
        <div class="demo-card-header">
            <span class="step-num">1</span>
            <span>Connect to API</span>
        </div>
        <div class="demo-card-body">
            <div class="mb-3">
                <label class="form-label">API base URL</label>
                <input type="text" id="inp-apiurl" class="form-control font-monospace"
                       value="https://user-api.simplybook.me"
                       placeholder="https://user-api.simplybook.me">
            </div>
            <div class="mb-3">
                <label class="form-label">Company login</label>
                <input type="text" id="inp-company" class="form-control" placeholder="mycompany">
            </div>
            <div class="mb-3">
                <label class="form-label">
                    Public API key
                    <span class="text-muted small">(Settings → Integrations → API)</span>
                </label>
                <input type="text" id="inp-apikey" class="form-control" placeholder="api_key_...">
            </div>
            <button id="btn-connect" class="btn btn-primary px-4">Connect</button>
        </div>
    </div>

    <!-- Step 2: Service -->
    <div class="demo-card" id="card-service">
        <div class="demo-card-header">
            <span class="step-num">2</span>
            <span>Select Service</span>
        </div>
        <div class="demo-card-body">
            <select id="sel-service" class="form-select mb-3">
                <option value="">— loading —</option>
            </select>
            <button id="btn-service" class="btn btn-primary px-4" disabled>Next →</button>
        </div>
    </div>

    <!-- Step 3: Provider -->
    <div class="demo-card" id="card-provider">
        <div class="demo-card-header">
            <span class="step-num">3</span>
            <span>Select Provider</span>
        </div>
        <div class="demo-card-body">
            <select id="sel-provider" class="form-select mb-3">
                <option value="">— loading —</option>
            </select>
            <button id="btn-provider" class="btn btn-primary px-4" disabled>Next →</button>
        </div>
    </div>

    <!-- Step 4: Date & Time -->
    <div class="demo-card" id="card-datetime">
        <div class="demo-card-header">
            <span class="step-num">4</span>
            <span>Select Date &amp; Time</span>
        </div>
        <div class="demo-card-body">
            <div class="mb-3">
                <label class="form-label">Date</label>
                <select id="sel-date" class="form-select">
                    <option value="">— loading dates —</option>
                </select>
            </div>
            <div id="time-section" class="mb-3" style="display:none;">
                <label class="form-label">Available times</label>
                <div id="time-slots" class="d-flex flex-wrap gap-2"></div>
            </div>
            <button id="btn-datetime" class="btn btn-primary px-4" disabled>Next →</button>
        </div>
    </div>

    <!-- Step 5: Details + Captcha -->
    <div class="demo-card" id="card-details">
        <div class="demo-card-header">
            <span class="step-num">5</span>
            <span>Your Details</span>
        </div>
        <div class="demo-card-body">
            <div id="booking-summary" class="summary-box mb-4" style="display:none;">
                <div class="summary-label">Booking summary</div>
                <div id="summary-text"></div>
            </div>
            <div class="mb-3">
                <label class="form-label">Name <span class="text-danger">*</span></label>
                <input type="text" id="inp-name" class="form-control" placeholder="John Doe">
            </div>
            <div class="mb-3">
                <label class="form-label">Email <span class="text-danger">*</span></label>
                <input type="email" id="inp-email" class="form-control" placeholder="john@example.com">
            </div>
            <div class="mb-3">
                <label class="form-label">Phone</label>
                <input type="tel" id="inp-phone" class="form-control" placeholder="+1234567890">
            </div>
            <div id="captcha-wrap" class="mb-3" style="display:none;">
                <label class="form-label">Security check</label>
                <div id="captcha-container"></div>
            </div>
            <button id="btn-book" class="btn btn-success px-4">Book Now</button>
        </div>
    </div>

    <!-- Result -->
    <div class="demo-card" id="card-result">
        <div class="demo-card-header success-header">
            <span class="step-num step-success">✓</span>
            <span>Booking Confirmed!</span>
        </div>
        <div class="demo-card-body">
            <div id="result-content" class="result-box p-3 rounded mb-3"></div>
            <button class="btn btn-outline-primary" onclick="location.reload()">New Booking</button>
        </div>
    </div>

    <!-- API Log -->
    <div class="mt-4">
        <button class="btn btn-sm btn-outline-secondary"
                data-bs-toggle="collapse" data-bs-target="#api-log">
            Toggle API Log
        </button>
        <div id="api-log" class="collapse mt-2">
            <div id="log-content" class="api-log"></div>
        </div>
    </div>

</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="json-rpc-client.js"></script>
<script src="app.js"></script>
</body>
</html>
